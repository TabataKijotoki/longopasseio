<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#faf7f2;font-family:'DM Sans',sans-serif;padding:28px;color:#2a1f14}
  .pair{display:flex;flex-direction:column;gap:6px}
  .label{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:#aaa;margin-bottom:6px}
  .display{font-family:'DM Serif Display',serif;font-size:34px;color:#2a1f14;line-height:1.15}
  .display em{font-style:italic}
  .sub{font-family:'DM Sans',sans-serif;font-size:14px;color:#9a8878;margin-top:4px}
  .strong{font-weight:600}
</style></head>
<body>
  <p class="label">the brand voice motif — italic serif aside paired with tight sans</p>
  <p class="display">o centro que<br/><em>nem todo mundo vê</em></p>
  <p class="sub">explore o centro <span class="strong" style="color:#2a1f14">em camadas.</span> · cafés que valem a pausa</p>
</body></html>
