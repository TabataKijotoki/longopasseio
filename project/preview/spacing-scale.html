<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#faf7f2;font-family:'DM Sans',sans-serif;padding:24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;align-items:flex-start;gap:8px}
  .swatch{display:flex;align-items:center;height:24px}
  .bar{height:14px;background:#2a1f14;border-radius:1px}
  .name{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#9a8878;font-weight:600;width:34px;display:inline-block;text-align:right;margin-right:10px}
  .meta{font-size:9px;color:#aaa}
</style></head>
<body>
  <div class="col">
    <div class="swatch"><span class="name">s-1</span><div class="bar" style="width:4px"></div><span class="meta" style="margin-left:8px">4px</span></div>
    <div class="swatch"><span class="name">s-2</span><div class="bar" style="width:6px"></div><span class="meta" style="margin-left:8px">6px</span></div>
    <div class="swatch"><span class="name">s-3</span><div class="bar" style="width:8px"></div><span class="meta" style="margin-left:8px">8px</span></div>
    <div class="swatch"><span class="name">s-4</span><div class="bar" style="width:10px"></div><span class="meta" style="margin-left:8px">10px</span></div>
    <div class="swatch"><span class="name">s-5</span><div class="bar" style="width:12px"></div><span class="meta" style="margin-left:8px">12px</span></div>
  </div>
  <div class="col">
    <div class="swatch"><span class="name">s-6</span><div class="bar" style="width:14px"></div><span class="meta" style="margin-left:8px">14px</span></div>
    <div class="swatch"><span class="name">s-7</span><div class="bar" style="width:16px"></div><span class="meta" style="margin-left:8px">16px</span></div>
    <div class="swatch"><span class="name">s-8</span><div class="bar" style="width:20px"></div><span class="meta" style="margin-left:8px">20px</span></div>
    <div class="swatch"><span class="name">s-9</span><div class="bar" style="width:24px"></div><span class="meta" style="margin-left:8px">24px</span></div>
  </div>
</body></html>
