<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#faf7f2;font-family:'DM Sans',sans-serif;padding:18px}
  .hero{border-radius:16px;overflow:hidden;border:1.5px solid #e8e0d4;box-shadow:0 4px 20px rgba(0,0,0,0.07);background:#fff;max-width:430px}
  .strips{display:flex;height:8px}
  .strips > div{flex:1}
  .body{padding:16px 18px 16px}
  .eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:#aaa;margin-bottom:6px}
  .title{font-family:'DM Serif Display',serif;font-size:24px;color:#2a1f14;line-height:1.2;margin-bottom:14px}
  .title em{font-style:italic}
  .cta{display:flex;align-items:center;justify-content:space-between;background:#2a1f14;border-radius:10px;padding:10px 14px}
  .cta span{color:#faf7f2;font-size:13px}
  .cta .text{font-weight:600;letter-spacing:0.04em}
  .cta .arrow{font-size:18px}
</style></head>
<body>
  <div class="hero">
    <div class="strips">
      <div style="background:#c8d8b0"></div><div style="background:#f2c4c4"></div><div style="background:#b8d4c8"></div>
      <div style="background:#e8d8b0"></div><div style="background:#b8d4b8"></div><div style="background:#d0c4e8"></div>
    </div>
    <div class="body">
      <p class="eyebrow">19 cafés curados · 6 bairros</p>
      <p class="title">o centro que<br/><em>nem todo mundo vê</em></p>
      <div class="cta"><span class="text">explorar cafés</span><span class="arrow">→</span></div>
    </div>
  </div>
</body></html>
