<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#faf7f2;font-family:'DM Sans',sans-serif;padding:24px;display:flex;gap:14px;align-items:stretch}
  .card{flex:1;border-radius:14px;padding:14px 16px;border:1.5px solid;display:flex;gap:10px;align-items:flex-start}
  .icon{font-size:18px;flex-shrink:0;line-height:1.1}
  .text{font-size:13px;line-height:1.5}
  .text strong{font-weight:700}
  .gold{background:#f5f0e6;border-color:#e8d8b0;color:#5a4a30}
  .gold .icon{color:#c8a84a}
  .red{background:#fce8e8;border-color:#f2c4c4;color:#8a3a3a}
  .red .icon{color:#e05a5a}
</style></head>
<body>
  <div class="card gold">
    <span class="icon">★</span>
    <p class="text"><strong>dica de ouro:</strong> vá sem pressa, peça um bom café e se perca (só um pouquinho).</p>
  </div>
  <div class="card red">
    <span class="icon">♥</span>
    <p class="text"><strong>favorito:</strong> heart-red is reserved for ❤ favorite hearts and the badge count. nothing else.</p>
  </div>
</body></html>
