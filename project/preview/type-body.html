<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#faf7f2;font-family:'DM Sans',sans-serif;padding:24px;color:#2a1f14}
  .row{display:flex;align-items:baseline;gap:14px;padding:6px 0;border-bottom:1px solid #f0ebe3}
  .row:last-child{border-bottom:none}
  .name{flex:0 0 110px;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#9a8878}
  .specimen{flex:1}
  .meta{flex:0 0 90px;font-size:11px;color:#aaa;text-align:right}
</style></head>
<body>
  <div class="row">
    <span class="name">Body</span>
    <span class="specimen" style="font-size:14px;line-height:1.65;color:#3a2e24">vá sem pressa, peça um bom café e se perca (só um pouquinho).</span>
    <span class="meta">Sans · 14/1.65</span>
  </div>
  <div class="row">
    <span class="name">Body sm</span>
    <span class="specimen" style="font-size:13px;color:#9a8878">3 cafés · 4–5 horas · de bairro em bairro</span>
    <span class="meta">Sans · 13</span>
  </div>
  <div class="row">
    <span class="name">Caption</span>
    <span class="specimen" style="font-size:12px;color:#9a8878">cafés que valem a pausa</span>
    <span class="meta">Sans · 12</span>
  </div>
  <div class="row">
    <span class="name">Eyebrow</span>
    <span class="specimen" style="font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:#aaa">hoje a gente sugere</span>
    <span class="meta">Sans · 10</span>
  </div>
  <div class="row">
    <span class="name">Vibe</span>
    <span class="specimen" style="font-family:'DM Serif Display',serif;font-style:italic;font-size:15px;color:#9a8878">"Ensolarado e focado"</span>
    <span class="meta">Serif italic · 15</span>
  </div>
</body></html>
