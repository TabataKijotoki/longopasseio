<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#1a1410;font-family:'DM Sans',sans-serif;padding:18px;display:flex;justify-content:center}
  .nav{width:380px;height:72px;background:rgba(250,247,242,0.96);backdrop-filter:blur(12px);border-top:1px solid #ece8e0;display:flex;padding-bottom:8px;border-radius:6px;overflow:hidden}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 0 0;background:none;border:none;cursor:pointer}
  .tab svg{display:block}
  .label{font-size:10px;letter-spacing:0.03em;position:relative}
  .badge{position:absolute;top:-6px;right:-10px;background:#e05a5a;color:#fff;font-size:9px;font-weight:700;border-radius:10px;width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center}
</style></head>
<body>
<div class="nav">
  <button class="tab" style="color:#bbb">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    <span class="label">Início</span>
  </button>
  <button class="tab" style="color:#2a1f14">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
    <span class="label" style="font-weight:600">Explorar</span>
  </button>
  <button class="tab" style="color:#bbb">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></svg>
    <span class="label">Roteiros</span>
  </button>
  <button class="tab" style="color:#bbb">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    <span class="label">Favoritos<span class="badge">3</span></span>
  </button>
</div>
</body></html>
