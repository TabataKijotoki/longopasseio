<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#faf7f2;font-family:'DM Sans',sans-serif;padding:20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(70px,1fr));gap:14px}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px;color:#2a1f14}
  .col svg{display:block}
  .label{font-size:10px;letter-spacing:0.05em;color:#9a8878}
  .ico{padding:8px;border:1.5px solid #ece8e0;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;width:44px;height:44px}
</style></head>
<body>
<div class="grid">
  <div class="col">
    <div class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2a1f14" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></div>
    <span class="label">Home</span>
  </div>
  <div class="col">
    <div class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2a1f14" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg></div>
    <span class="label">Map</span>
  </div>
  <div class="col">
    <div class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2a1f14" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></svg></div>
    <span class="label">Route</span>
  </div>
  <div class="col">
    <div class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="#e05a5a" stroke="#e05a5a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
    <span class="label">Heart</span>
  </div>
  <div class="col">
    <div class="ico"><svg width="22" height="22" viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="#2a1f14" stroke-width="1.8"/><path d="M13 13l3.5 3.5" stroke="#2a1f14" stroke-width="1.8" stroke-linecap="round"/></svg></div>
    <span class="label">Search</span>
  </div>
  <div class="col">
    <div class="ico" style="background:#f5f0e6;border-color:#e8d8b0"><span style="font-size:18px;color:#c8a84a;line-height:1">★</span></div>
    <span class="label">Star · ouro</span>
  </div>
  <div class="col">
    <div class="ico" style="font-size:24px;line-height:1">☀️</div>
    <span class="label">tarde</span>
  </div>
  <div class="col">
    <div class="ico" style="font-size:24px;line-height:1">🌅</div>
    <span class="label">manhã</span>
  </div>
  <div class="col">
    <div class="ico" style="font-size:24px;line-height:1">🌇</div>
    <span class="label">fim-tarde</span>
  </div>
  <div class="col">
    <div class="ico" style="font-size:22px;line-height:1">☕</div>
    <span class="label">rota</span>
  </div>
</div>
</body></html>
