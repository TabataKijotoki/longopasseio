<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#faf7f2;font-family:'DM Sans',sans-serif;padding:24px;display:flex;flex-direction:column;gap:14px}
  .input{display:flex;align-items:center;gap:10px;background:#f0ebe3;border-radius:12px;padding:10px 14px}
  .input svg{flex-shrink:0}
  .input input{flex:1;background:transparent;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;color:#3a2e24}
  .input input::placeholder{color:#bbb}
  .pill{display:inline-flex;align-items:center;font-size:11px;color:#faf7f2;background:#2a1f14;padding:4px 12px;border-radius:20px;letter-spacing:0.05em}
  .badge{display:inline-flex;align-items:center;justify-content:center;background:#e05a5a;color:#fff;font-size:9px;font-weight:700;border-radius:10px;width:16px;height:16px}
  .row{display:flex;gap:14px;align-items:center}
  .label{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:#aaa;width:78px;flex-shrink:0}
  .vibetag{display:inline-flex;align-items:center;background:#fff;color:#5a4a30;border:1.5px solid #ece8e0;font-size:11px;padding:3px 10px;border-radius:20px}
</style></head>
<body>
  <div class="input">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="#bbb" stroke-width="1.8"/><path d="M13 13l3.5 3.5" stroke="#bbb" stroke-width="1.8" stroke-linecap="round"/></svg>
    <input placeholder="buscar café…"/>
    <span style="color:#bbb;font-size:18px">×</span>
  </div>
  <div class="row">
    <span class="label">Pill</span>
    <span class="pill">centro</span>
    <span class="pill" style="background:#5a4a30">aberto agora</span>
    <span class="vibetag">trabalhar</span>
    <span class="vibetag">especialidade</span>
    <span style="position:relative;display:inline-flex;align-items:center;font-size:11px;color:#5a4a30">Favoritos<span class="badge" style="position:absolute;top:-6px;right:-22px">3</span></span>
  </div>
</body></html>
