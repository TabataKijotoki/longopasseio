<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#faf7f2;font-family:'DM Sans',sans-serif;padding:24px}
  .scale{display:flex;border-radius:10px;overflow:hidden;border:1.5px solid #e8e0d4}
  .step{flex:1;height:80px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:9px;letter-spacing:0.04em}
  .name{font-weight:600;font-size:10px;letter-spacing:0.02em}
  .hex{font-size:9px;opacity:0.85;margin-top:1px}
  .hint{font-size:11px;color:#9a8878;margin-top:14px;font-style:italic;font-family:'DM Serif Display',serif}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="scale">
    <div class="step" style="background:#2a1f14;color:#faf7f2"><span class="name">ink-1</span><span class="hex">#2a1f14</span></div>
    <div class="step" style="background:#3a2e24;color:#faf7f2"><span class="name">ink-2</span><span class="hex">#3a2e24</span></div>
    <div class="step" style="background:#5a4a30;color:#faf7f2"><span class="name">ink-3</span><span class="hex">#5a4a30</span></div>
    <div class="step" style="background:#9a8878;color:#fff"><span class="name">ink-4</span><span class="hex">#9a8878</span></div>
    <div class="step" style="background:#b8a898;color:#3a2e24"><span class="name">ink-5</span><span class="hex">#b8a898</span></div>
    <div class="step" style="background:#cccccc;color:#3a2e24"><span class="name">ink-8</span><span class="hex">#cccccc</span></div>
  </div>
  <p class="hint">espresso → faded mauve · italic vibe quotes always sit at ink-4 / ink-5</p>
</body></html>
