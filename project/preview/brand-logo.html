<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#faf7f2;font-family:'DM Sans',sans-serif;padding:24px;display:flex;flex-direction:column;gap:14px;align-items:center}
  .logo{font-family:'DM Serif Display',serif;color:#2a1f14;line-height:1}
  .logo em{font-style:italic}
  .strip{display:flex;height:8px;width:280px;border-radius:4px;overflow:hidden;margin-top:6px}
  .strip > div{flex:1}
  .pill{display:inline-flex;background:#2a1f14;color:#faf7f2;font-size:11px;padding:4px 12px;border-radius:20px;letter-spacing:0.05em}
  .curad{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#aaa}
</style></head>
<body>
  <p class="curad">curadoria por Tabata Kijotoki</p>
  <div style="display:flex;align-items:flex-start;gap:14px">
    <p class="logo" style="font-size:36px">Longo <em>Passeio</em></p>
    <span class="pill" style="margin-top:10px">centro</span>
  </div>
  <p style="font-family:'DM Serif Display',serif;font-style:italic;font-size:14px;color:#9a8878;margin-top:2px"><em>...o mundo além</em> do seu quintal</p>
  <div class="strip">
    <div style="background:#c8d8b0"></div><div style="background:#f2c4c4"></div><div style="background:#b8d4c8"></div>
    <div style="background:#e8d8b0"></div><div style="background:#b8d4b8"></div><div style="background:#d0c4e8"></div>
  </div>
</body></html>
