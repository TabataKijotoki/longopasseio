<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#faf7f2;font-family:'DM Sans',sans-serif;padding:24px;color:#2a1f14}
  .row{display:flex;align-items:baseline;gap:14px;padding:6px 0;border-bottom:1px solid #f0ebe3}
  .row:last-child{border-bottom:none}
  .name{flex:0 0 110px;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#9a8878}
  .specimen{flex:1}
  .meta{flex:0 0 90px;font-size:11px;color:#aaa;text-align:right}
</style></head>
<body>
  <div class="row">
    <span class="name">Display</span>
    <span class="specimen" style="font-family:'DM Serif Display',serif;font-size:32px;line-height:1.15;color:#2a1f14">Explore o centro <em>em camadas.</em></span>
    <span class="meta">Serif · 32/1.15</span>
  </div>
  <div class="row">
    <span class="name">H1 / Logo</span>
    <span class="specimen" style="font-family:'DM Serif Display',serif;font-size:28px;color:#2a1f14">SP em <em>Camadas</em></span>
    <span class="meta">Serif · 28</span>
  </div>
  <div class="row">
    <span class="name">H2</span>
    <span class="specimen" style="font-family:'DM Serif Display',serif;font-size:26px;color:#2a1f14">o centro que <em>nem todo mundo vê</em></span>
    <span class="meta">Serif · 26</span>
  </div>
  <div class="row">
    <span class="name">H3</span>
    <span class="specimen" style="font-family:'DM Serif Display',serif;font-size:20px;color:#2a1f14">Tarde de Descoberta</span>
    <span class="meta">Serif · 20</span>
  </div>
  <div class="row">
    <span class="name">H4</span>
    <span class="specimen" style="font-family:'DM Serif Display',serif;font-size:16px;color:#2a1f14">Café Floresta</span>
    <span class="meta">Serif · 16</span>
  </div>
</body></html>
