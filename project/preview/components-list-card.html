<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#faf7f2;font-family:'DM Sans',sans-serif;padding:18px;display:flex;gap:14px;align-items:flex-start}
  .listcard{flex:1;background:#fff;border:1.5px solid #e8e0d4;border-radius:14px;display:flex;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.04);min-height:96px}
  .strip{width:5px;flex-shrink:0}
  .body{flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:4px}
  .name{font-family:'DM Serif Display',serif;font-size:16px;color:#2a1f14}
  .vibe{font-family:'DM Serif Display',serif;font-style:italic;font-size:12px;color:#9a8878}
  .meta{font-size:11px;color:#aaa;letter-spacing:0.04em;display:flex;gap:6px;margin-top:auto}
  .heart{align-self:flex-start;font-size:16px;color:#cccccc;padding:14px 14px 0 0}
</style></head>
<body>
  <div class="listcard">
    <div class="strip" style="background:#c8d8b0"></div>
    <div class="body">
      <p class="name">Café Floresta</p>
      <p class="vibe">"Ensolarado e focado"</p>
      <p class="meta">Santa Cecília · trabalhar · especialidade</p>
    </div>
    <span class="heart">♡</span>
  </div>
  <div class="listcard">
    <div class="strip" style="background:#f2c4c4"></div>
    <div class="body">
      <p class="name">Padaria Viena</p>
      <p class="vibe">"Acolhedor e despretensioso"</p>
      <p class="meta">Vila Buarque · encontro · leitura</p>
    </div>
    <span class="heart" style="color:#e05a5a">♥</span>
  </div>
</body></html>
