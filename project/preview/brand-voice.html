<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#faf7f2;font-family:'DM Sans',sans-serif;padding:24px;display:flex;flex-direction:column;gap:12px}
  .quote{font-family:'DM Serif Display',serif;font-style:italic;font-size:18px;color:#2a1f14;line-height:1.4}
  .quote .accent{color:#9a8878}
  .body{font-size:13px;color:#3a2e24;line-height:1.55}
  .body strong{font-weight:700;color:#5a4a30}
  .row{display:flex;gap:12px;font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:0.12em}
</style></head>
<body>
  <p class="row">VOICE — italic serif aside as emotional kicker</p>
  <p class="quote"><em>...o mundo além</em> <span class="accent">do seu quintal.</span></p>
  <p class="body"><strong>dica de ouro:</strong> 19 cafés curados · 6 bairros · de bairro em bairro, lugares pra ir <em style="color:#9a8878">sem pressa</em>.</p>
</body></html>
