<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#faf7f2;font-family:'DM Sans',sans-serif;padding:24px}
  .row{display:flex;gap:16px;align-items:flex-end}
  .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{background:#fff;border:1.5px solid #e8e0d4}
  .name{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#9a8878;font-weight:600}
  .meta{font-size:10px;color:#aaa;font-family:'DM Sans',sans-serif}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="width:54px;height:54px;border-radius:10px"></div><span class="name">cta</span><span class="meta">10px</span></div>
    <div class="col"><div class="box" style="width:54px;height:54px;border-radius:12px"></div><span class="name">input</span><span class="meta">12px</span></div>
    <div class="col"><div class="box" style="width:54px;height:54px;border-radius:14px"></div><span class="name">card</span><span class="meta">14px</span></div>
    <div class="col"><div class="box" style="width:54px;height:54px;border-radius:16px"></div><span class="name">card-lg</span><span class="meta">16px</span></div>
    <div class="col"><div class="box" style="width:80px;height:30px;border-radius:20px"></div><span class="name">pill</span><span class="meta">20px</span></div>
    <div class="col"><div class="box" style="width:54px;height:60px;border-radius:44px 44px 0 0"></div><span class="name">phone</span><span class="meta">44px</span></div>
  </div>
</body></html>
